<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="parent">
        <div id="error" style="display: none; color: red; background-color: orange; text-align: center; font-weight: bold; height: 10%; padding: 10px; box-sizing: border-box; border-top-left-radius: 10px; border-top-right-radius: 10px;"></div>

        <h2>Login</h2>
        <form action="" id="form">
            <input type="email" name="" id="email" placeholder="Email">
            <input type="password" name="" id="password" placeholder="Password">
            <button type="submit" id="submit">Login</button>
        </form>
        
    </div>
    <script src="login.js"></script>
</body>
</html>
